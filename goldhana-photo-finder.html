<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parth & Riddhi's Goldhana Photo Finder</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #8B4513 0%, #D2691E  50%, #CD853F 100%);
            min-height: 100vh;
            color: #2C1810;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 2px solid #D4AF37;
        }

        .header h1 {
            font-size: 3rem;
            color: #8B4513;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .header .ceremony {
            font-size: 1.8rem;
            color: #D2691E;
            font-weight: 300;
            margin-bottom: 15px;
        }

        .header p {
            font-size: 1.1rem;
            color: #5D4E37;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
        }

        .section {
            background: rgba(255, 255, 255, 0.95);
            margin: 20px 0;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.1);
            border: 1px solid #DDD;
        }

        .section h2 {
            color: #8B4513;
            margin-bottom: 20px;
            font-size: 1.5rem;
            border-bottom: 2px solid #D4AF37;
            padding-bottom: 10px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #5D4E37;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #DDD;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #D4AF37;
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
        }

        .btn {
            background: linear-gradient(135deg, #D4AF37 0%, #FFD700 100%);
            color: #8B4513;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin: 5px;
            box-shadow: 0 4px 12px rgba(212, 175, 55, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(212, 175, 55, 0.4);
        }

        .btn:disabled {
            background: #CCC;
            color: #888;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-secondary {
            background: linear-gradient(135deg, #CD853F 0%, #D2691E 100%);
            color: white;
        }

        .upload-area {
            border: 3px dashed #D4AF37;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(212, 175, 55, 0.05);
        }

        .upload-area:hover {
            border-color: #8B4513;
            background: rgba(212, 175, 55, 0.1);
        }

        .upload-area.dragover {
            border-color: #8B4513;
            background: rgba(212, 175, 55, 0.15);
        }

        .camera-container {
            position: relative;
            max-width: 500px;
            margin: 0 auto;
        }

        .camera-feed {
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
        }

        .capture-btn {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #D4AF37;
            border: none;
            border-radius: 50%;
            width: 80px;
            height: 80px;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
            transition: all 0.3s;
        }

        .capture-btn:hover {
            transform: translateX(-50%) scale(1.1);
        }

        .loading {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #D4AF37;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .photo-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s;
        }

        .photo-card:hover {
            transform: translateY(-5px);
        }

        .photo-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .photo-info {
            padding: 15px;
        }

        .confidence-bar {
            background: #f0f0f0;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            margin: 10px 0;
        }

        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, #D4AF37, #FFD700);
            transition: width 0.3s;
        }

        .folder-tree {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 15px;
            margin: 15px 0;
            font-family: monospace;
            font-size: 14px;
            max-height: 300px;
            overflow-y: auto;
        }

        .folder-item {
            margin: 2px 0;
            padding: 2px 0;
        }

        .folder-item.folder {
            color: #007bff;
            font-weight: bold;
        }

        .folder-item.file {
            color: #28a745;
            margin-left: 20px;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #f5c6cb;
            margin: 15px 0;
        }

        .success {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #c3e6cb;
            margin: 15px 0;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .stat-item {
            text-align: center;
            padding: 15px;
            background: rgba(212, 175, 55, 0.1);
            border-radius: 8px;
            margin: 5px;
            min-width: 120px;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: #8B4513;
        }

        .stat-label {
            color: #5D4E37;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }

            .header h1 {
                font-size: 2rem;
            }

            .header .ceremony {
                font-size: 1.3rem;
            }

            .gallery {
                grid-template-columns: 1fr;
            }

            .stats {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const FACE_API_MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api@latest/model';
        const CONFIDENCE_THRESHOLD = 0.45; // Lower = more strict matching

        function App() {
            const [apiKey, setApiKey] = useState('');
            const [driveUrl, setDriveUrl] = useState('');
            const [isLoadingModels, setIsLoadingModels] = useState(false);
            const [modelsLoaded, setModelsLoaded] = useState(false);
            const [isIndexingPhotos, setIsIndexingPhotos] = useState(false);
            const [indexedPhotos, setIndexedPhotos] = useState([]);
            const [folderStructure, setFolderStructure] = useState([]);
            const [guestPhoto, setGuestPhoto] = useState(null);
            const [isProcessingGuest, setIsProcessingGuest] = useState(false);
            const [matchedPhotos, setMatchedPhotos] = useState([]);
            const [showCamera, setShowCamera] = useState(false);
            const [error, setError] = useState('');
            const [success, setSuccess] = useState('');
            
            const videoRef = useRef(null);
            const canvasRef = useRef(null);
            const fileInputRef = useRef(null);

            // Load face-api models
            const loadModels = async () => {
                setIsLoadingModels(true);
                setError('');
                try {
                    await faceapi.nets.ssdMobilenetv1.loadFromUri(FACE_API_MODEL_URL);
                    await faceapi.nets.faceLandmark68Net.loadFromUri(FACE_API_MODEL_URL);
                    await faceapi.nets.faceRecognitionNet.loadFromUri(FACE_API_MODEL_URL);
                    setModelsLoaded(true);
                    setSuccess('Face detection models loaded successfully!');
                } catch (err) {
                    setError('Failed to load face detection models: ' + err.message);
                } finally {
                    setIsLoadingModels(false);
                }
            };

            useEffect(() => {
                loadModels();
            }, []);

            // Extract folder ID from Google Drive URL
            const extractFolderId = (url) => {
                const match = url.match(/folders\/([a-zA-Z0-9-_]+)/);
                return match ? match[1] : null;
            };

            // Recursively fetch all files from Google Drive folder
            const fetchDriveFiles = async (folderId, path = '', structure = []) => {
                try {
                    let pageToken = '';
                    let allFiles = [];
                    
                    do {
                        const url = `https://www.googleapis.com/drive/v3/files?q='${folderId}'+in+parents&key=${apiKey}&fields=files(id,name,mimeType,webContentLink,webViewLink),nextPageToken${pageToken ? `&pageToken=${pageToken}` : ''}`;
                        const response = await fetch(url);
                        
                        if (!response.ok) {
                            throw new Error(`Google Drive API error: ${response.status}`);
                        }
                        
                        const data = await response.json();
                        allFiles = allFiles.concat(data.files || []);
                        pageToken = data.nextPageToken;
                    } while (pageToken);

                    const currentLevel = { path, files: [], folders: [] };
                    structure.push(currentLevel);

                    const files = [];
                    
                    for (const file of allFiles) {
                        if (file.mimeType === 'application/vnd.google-apps.folder') {
                            currentLevel.folders.push(file.name);
                            const subFiles = await fetchDriveFiles(file.id, `${path}/${file.name}`, structure);
                            files.push(...subFiles);
                        } else if (file.mimeType.startsWith('image/')) {
                            currentLevel.files.push(file.name);
                            files.push({
                                id: file.id,
                                name: file.name,
                                path: `${path}/${file.name}`,
                                downloadUrl: file.webContentLink,
                                viewUrl: file.webViewLink
                            });
                        }
                    }
                    
                    return files;
                } catch (error) {
                    console.error('Error fetching drive files:', error);
                    throw error;
                }
            };

            // Extract face descriptors from image
            const extractFaceDescriptor = async (imageElement) => {
                try {
                    const detection = await faceapi
                        .detectSingleFace(imageElement)
                        .withFaceLandmarks()
                        .withFaceDescriptor();
                    
                    return detection ? detection.descriptor : null;
                } catch (error) {
                    console.warn('Face detection failed:', error);
                    return null;
                }
            };

            // Index all photos from Google Drive
            const indexPhotos = async () => {
                if (!apiKey || !driveUrl) {
                    setError('Please enter both API key and Drive folder URL');
                    return;
                }

                const folderId = extractFolderId(driveUrl);
                if (!folderId) {
                    setError('Invalid Google Drive folder URL');
                    return;
                }

                setIsIndexingPhotos(true);
                setError('');
                setSuccess('');
                setFolderStructure([]);

                try {
                    const structure = [];
                    const files = await fetchDriveFiles(folderId, 'Goldhana Photos', structure);
                    setFolderStructure(structure);

                    const indexed = [];
                    let processed = 0;

                    for (const file of files) {
                        try {
                            setSuccess(`Processing ${file.name}... (${processed + 1}/${files.length})`);
                            
                            const img = new Image();
                            img.crossOrigin = 'anonymous';
                            
                            await new Promise((resolve, reject) => {
                                img.onload = () => {
                                    console.log(`Loaded image: ${file.name}, Size: ${img.width}x${img.height}`);
                                    resolve();
                                };
                                img.onerror = (error) => {
                                    console.error(`Failed to load image: ${file.name}`, error);
                                    reject(error);
                                };
                                // Try direct download URL first, fallback to thumbnail
                                img.src = `https://drive.google.com/thumbnail?id=${file.id}&sz=w800`;
                            });

                            const descriptor = await extractFaceDescriptor(img);
                            console.log(`Face detection result for ${file.name}:`, descriptor ? 'Found face' : 'No face');
                            if (descriptor) {
                                indexed.push({
                                    ...file,
                                    descriptor,
                                    thumbnail: img.src
                                });
                            }
                        } catch (error) {
                            console.warn(`Failed to process ${file.name}:`, error);
                        }
                        processed++;
                    }

                    setIndexedPhotos(indexed);
                    setSuccess(`Successfully indexed ${indexed.length} photos with faces from ${files.length} total images!`);
                } catch (error) {
                    setError('Failed to index photos: ' + error.message);
                } finally {
                    setIsIndexingPhotos(false);
                }
            };

            // Handle direct photo upload
            const handlePhotoUpload = async (files) => {
                setIsIndexingPhotos(true);
                setError('');
                setSuccess('');

                try {
                    const indexed = [];
                    
                    for (const file of files) {
                        if (!file.type.startsWith('image/')) continue;
                        
                        const img = new Image();
                        const url = URL.createObjectURL(file);
                        
                        await new Promise((resolve, reject) => {
                            img.onload = resolve;
                            img.onerror = reject;
                            img.src = url;
                        });

                        const descriptor = await extractFaceDescriptor(img);
                        if (descriptor) {
                            indexed.push({
                                id: file.name,
                                name: file.name,
                                path: file.name,
                                descriptor,
                                thumbnail: url,
                                downloadUrl: url
                            });
                        }
                        
                        URL.revokeObjectURL(url);
                    }

                    setIndexedPhotos(indexed);
                    setSuccess(`Successfully indexed ${indexed.length} photos with faces!`);
                } catch (error) {
                    setError('Failed to process uploaded photos: ' + error.message);
                } finally {
                    setIsIndexingPhotos(false);
                }
            };

            // Start camera for selfie
            const startCamera = async () => {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { facingMode: 'user' } 
                    });
                    if (videoRef.current) {
                        videoRef.current.srcObject = stream;
                        setShowCamera(true);
                    }
                } catch (error) {
                    setError('Failed to access camera: ' + error.message);
                }
            };

            // Capture selfie from camera
            const captureSelfie = () => {
                const video = videoRef.current;
                const canvas = canvasRef.current;
                
                if (video && canvas) {
                    const context = canvas.getContext('2d');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    context.drawImage(video, 0, 0);
                    
                    canvas.toBlob((blob) => {
                        const file = new File([blob], 'selfie.jpg', { type: 'image/jpeg' });
                        processGuestPhoto(file);
                    });
                    
                    // Stop camera
                    const stream = video.srcObject;
                    if (stream) {
                        stream.getTracks().forEach(track => track.stop());
                    }
                    setShowCamera(false);
                }
            };

            // Process guest photo and find matches
            const processGuestPhoto = async (file) => {
                if (!modelsLoaded) {
                    setError('Face detection models not loaded yet');
                    return;
                }

                if (indexedPhotos.length === 0) {
                    setError('No photos indexed yet. Please add photos first.');
                    return;
                }

                setIsProcessingGuest(true);
                setError('');
                setMatchedPhotos([]);

                try {
                    const img = new Image();
                    const url = URL.createObjectURL(file);
                    
                    await new Promise((resolve, reject) => {
                        img.onload = resolve;
                        img.onerror = reject;
                        img.src = url;
                    });

                    setGuestPhoto(url);

                    const guestDescriptor = await extractFaceDescriptor(img);
                    if (!guestDescriptor) {
                        throw new Error('No face detected in your photo. Please try again with a clearer image.');
                    }

                    const matches = [];
                    const seenPhotos = new Set();

                    for (const photo of indexedPhotos) {
                        const distance = faceapi.euclideanDistance(guestDescriptor, photo.descriptor);
                        const confidence = Math.max(0, (1 - distance) * 100);
                        
                        if (distance < CONFIDENCE_THRESHOLD && !seenPhotos.has(photo.id)) {
                            matches.push({ ...photo, confidence, distance });
                            seenPhotos.add(photo.id);
                        }
                    }

                    matches.sort((a, b) => a.distance - b.distance);
                    setMatchedPhotos(matches);
                    setSuccess(matches.length > 0 ? 
                        `Found ${matches.length} photos featuring you!` : 
                        'No matches found. Try a different photo or adjust lighting.'
                    );

                    URL.revokeObjectURL(url);
                } catch (error) {
                    setError(error.message);
                    setIsProcessingGuest(false);
                } finally {
                    setIsProcessingGuest(false);
                }
            };

            // Download all matched photos
            const downloadAllMatches = () => {
                matchedPhotos.forEach((photo, index) => {
                    setTimeout(() => {
                        const link = document.createElement('a');
                        link.href = photo.downloadUrl;
                        link.download = photo.name;
                        link.click();
                    }, index * 500); // Stagger downloads
                });
            };

            return (
                <div className="container">
                    <div className="header">
                        <h1>🌺 Parth & Riddhi 🌺</h1>
                        <div className="ceremony">Goldhana Ceremony</div>
                        <p>Find photos featuring you! Upload a selfie and discover all the beautiful moments you're part of.</p>
                    </div>

                    {/* Photo Indexing Section */}
                    <div className="section">
                        <h2>📸 Step 1: Add Wedding Photos</h2>
                        
                        <div style={{ display: 'flex', gap: '20px', marginBottom: '20px', flexWrap: 'wrap' }}>
                            <div style={{ flex: '1', minWidth: '300px' }}>
                                <h3 style={{ marginBottom: '15px', color: '#8B4513' }}>Option A: Google Drive Folder</h3>
                                <div className="input-group">
                                    <label htmlFor="apiKey">Google Drive API Key:</label>
                                    <input
                                        type="text"
                                        id="apiKey"
                                        value={apiKey}
                                        onChange={(e) => setApiKey(e.target.value)}
                                        placeholder="Enter your Google Drive API key"
                                    />
                                </div>
                                <div className="input-group">
                                    <label htmlFor="driveUrl">Drive Folder URL:</label>
                                    <input
                                        type="url"
                                        id="driveUrl"
                                        value={driveUrl}
                                        onChange={(e) => setDriveUrl(e.target.value)}
                                        placeholder="https://drive.google.com/drive/folders/..."
                                    />
                                </div>
                                <button 
                                    className="btn" 
                                    onClick={indexPhotos}
                                    disabled={!modelsLoaded || isIndexingPhotos || !apiKey || !driveUrl}
                                >
                                    {isIndexingPhotos ? 'Indexing Photos...' : 'Index Drive Photos'}
                                </button>
                            </div>
                            
                            <div style={{ flex: '1', minWidth: '300px' }}>
                                <h3 style={{ marginBottom: '15px', color: '#8B4513' }}>Option B: Direct Upload</h3>
                                <div 
                                    className="upload-area"
                                    onClick={() => fileInputRef.current?.click()}
                                    onDrop={(e) => {
                                        e.preventDefault();
                                        e.currentTarget.classList.remove('dragover');
                                        handlePhotoUpload(Array.from(e.dataTransfer.files));
                                    }}
                                    onDragOver={(e) => {
                                        e.preventDefault();
                                        e.currentTarget.classList.add('dragover');
                                    }}
                                    onDragLeave={(e) => {
                                        e.currentTarget.classList.remove('dragover');
                                    }}
                                >
                                    <div style={{ fontSize: '3rem', marginBottom: '15px' }}>📷</div>
                                    <p>Click or drag photos here</p>
                                    <p style={{ fontSize: '0.9rem', color: '#888', marginTop: '5px' }}>
                                        Supports JPG, PNG, and other image formats
                                    </p>
                                </div>
                                <input
                                    type="file"
                                    ref={fileInputRef}
                                    multiple
                                    accept="image/*"
                                    style={{ display: 'none' }}
                                    onChange={(e) => handlePhotoUpload(Array.from(e.target.files))}
                                />
                            </div>
                        </div>

                        {/* Model Loading Status */}
                        {isLoadingModels && (
                            <div className="loading">
                                <div className="spinner"></div>
                                <p>Loading face detection models...</p>
                            </div>
                        )}

                        {/* Folder Structure Display */}
                        {folderStructure.length > 0 && (
                            <div>
                                <h4 style={{ color: '#8B4513', marginBottom: '10px' }}>📁 Folder Structure Found:</h4>
                                <div className="folder-tree">
                                    {folderStructure.map((level, index) => (
                                        <div key={index}>
                                            <div className="folder-item folder">
                                                {level.path || 'Root'}
                                                {level.folders.length > 0 && ` (${level.folders.length} subfolders)`}
                                                {level.files.length > 0 && ` (${level.files.length} images)`}
                                            </div>
                                            {level.folders.map((folder, i) => (
                                                <div key={i} className="folder-item folder" style={{ marginLeft: '20px' }}>
                                                    📁 {folder}
                                                </div>
                                            ))}
                                            {level.files.slice(0, 3).map((file, i) => (
                                                <div key={i} className="folder-item file">
                                                    🖼️ {file}
                                                </div>
                                            ))}
                                            {level.files.length > 3 && (
                                                <div className="folder-item file">
                                                    ... and {level.files.length - 3} more images
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* Stats */}
                        {indexedPhotos.length > 0 && (
                            <div className="stats">
                                <div className="stat-item">
                                    <div className="stat-number">{indexedPhotos.length}</div>
                                    <div className="stat-label">Photos Indexed</div>
                                </div>
                                <div className="stat-item">
                                    <div className="stat-number">{folderStructure.reduce((acc, level) => acc + level.folders.length, 0)}</div>
                                    <div className="stat-label">Folders Scanned</div>
                                </div>
                                <div className="stat-item">
                                    <div className="stat-number">{Math.round((1 - CONFIDENCE_THRESHOLD) * 100)}%</div>
                                    <div className="stat-label">Match Threshold</div>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* Guest Photo Section */}
                    {modelsLoaded && indexedPhotos.length > 0 && (
                        <div className="section">
                            <h2>🤳 Step 2: Upload Your Photo</h2>
                            <p style={{ marginBottom: '20px', color: '#5D4E37' }}>
                                Take a selfie or upload a clear photo of yourself to find matching photos.
                            </p>
                            
                            <div style={{ display: 'flex', gap: '15px', marginBottom: '20px', flexWrap: 'wrap' }}>
                                <button className="btn" onClick={startCamera}>
                                    📷 Take Selfie
                                </button>
                                <button 
                                    className="btn btn-secondary"
                                    onClick={() => {
                                        const input = document.createElement('input');
                                        input.type = 'file';
                                        input.accept = 'image/*';
                                        input.onchange = (e) => processGuestPhoto(e.target.files[0]);
                                        input.click();
                                    }}
                                >
                                    📁 Upload Photo
                                </button>
                            </div>

                            {/* Camera Feed */}
                            {showCamera && (
                                <div className="camera-container">
                                    <video 
                                        ref={videoRef} 
                                        autoPlay 
                                        muted 
                                        className="camera-feed"
                                    />
                                    <button className="capture-btn" onClick={captureSelfie}>
                                        📸
                                    </button>
                                </div>
                            )}

                            {/* Processing Status */}
                            {isProcessingGuest && (
                                <div className="loading">
                                    <div className="spinner"></div>
                                    <p>Analyzing your photo and finding matches...</p>
                                </div>
                            )}

                            {/* Guest Photo Preview */}
                            {guestPhoto && (
                                <div style={{ textAlign: 'center', margin: '20px 0' }}>
                                    <h4 style={{ color: '#8B4513', marginBottom: '10px' }}>Your Photo:</h4>
                                    <img 
                                        src={guestPhoto} 
                                        alt="Guest photo" 
                                        style={{ 
                                            maxWidth: '200px', 
                                            borderRadius: '12px',
                                            boxShadow: '0 4px 16px rgba(0, 0, 0, 0.2)'
                                        }} 
                                    />
                                </div>
                            )}
                        </div>
                    )}

                    {/* Results Section */}
                    {matchedPhotos.length > 0 && (
                        <div className="section">
                            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '20px' }}>
                                <h2>✨ Your Photos ({matchedPhotos.length})</h2>
                                <button className="btn" onClick={downloadAllMatches}>
                                    💾 Download All
                                </button>
                            </div>
                            
                            <div className="gallery">
                                {matchedPhotos.map((photo, index) => (
                                    <div key={photo.id + index} className="photo-card">
                                        <img src={photo.thumbnail} alt={photo.name} />
                                        <div className="photo-info">
                                            <h4 style={{ marginBottom: '10px', color: '#8B4513' }}>
                                                {photo.name}
                                            </h4>
                                            <div className="confidence-bar">
                                                <div 
                                                    className="confidence-fill"
                                                    style={{ width: `${photo.confidence}%` }}
                                                />
                                            </div>
                                            <p style={{ fontSize: '0.9rem', color: '#666' }}>
                                                Match: {photo.confidence.toFixed(1)}%
                                            </p>
                                            <button 
                                                className="btn"
                                                style={{ marginTop: '10px', width: '100%' }}
                                                onClick={() => {
                                                    const link = document.createElement('a');
                                                    link.href = photo.downloadUrl;
                                                    link.download = photo.name;
                                                    link.click();
                                                }}
                                            >
                                                💾 Download
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* Error/Success Messages */}
                    {error && <div className="error">❌ {error}</div>}
                    {success && <div className="success">✅ {success}</div>}

                    {/* Hidden Canvas for Photo Capture */}
                    <canvas ref={canvasRef} style={{ display: 'none' }} />
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
