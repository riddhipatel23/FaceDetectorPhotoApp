<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parth & Riddhi's Photo Setup - Host Panel</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #8B4513 0%, #D2691E  50%, #CD853F 100%);
            min-height: 100vh;
            color: #2C1810;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 2px solid #D4AF37;
        }

        .header h1 {
            font-size: 2.5rem;
            color: #8B4513;
            margin-bottom: 10px;
        }

        .section {
            background: rgba(255, 255, 255, 0.95);
            margin: 20px 0;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.1);
        }

        .section h2 {
            color: #8B4513;
            margin-bottom: 20px;
            font-size: 1.5rem;
            border-bottom: 2px solid #D4AF37;
            padding-bottom: 10px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #5D4E37;
        }

        .input-group input, .input-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #DDD;
            border-radius: 8px;
            font-size: 16px;
            font-family: inherit;
        }

        .btn {
            background: linear-gradient(135deg, #D4AF37 0%, #FFD700 100%);
            color: #8B4513;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin: 5px;
            box-shadow: 0 4px 12px rgba(212, 175, 55, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(212, 175, 55, 0.4);
        }

        .btn:disabled {
            background: #CCC;
            color: #888;
            cursor: not-allowed;
            transform: none;
        }

        .upload-area {
            border: 3px dashed #D4AF37;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            background: rgba(212, 175, 55, 0.05);
        }

        .upload-area:hover, .upload-area.dragover {
            border-color: #8B4513;
            background: rgba(212, 175, 55, 0.1);
        }

        .loading {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #D4AF37;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .stat-item {
            text-align: center;
            padding: 15px;
            background: rgba(212, 175, 55, 0.1);
            border-radius: 8px;
            margin: 5px;
            min-width: 120px;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: #8B4513;
        }

        .success {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
        }

        .instructions {
            background: #fff8e1;
            border: 2px solid #D4AF37;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
        }

        .instructions h3 {
            color: #8B4513;
            margin-bottom: 15px;
        }

        .instructions ol {
            padding-left: 20px;
            line-height: 2;
            color: #5D4E37;
        }

        .instructions code {
            background: #f0e6c0;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.9em;
        }

        .folder-tree {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 15px;
            margin: 15px 0;
            font-family: monospace;
            font-size: 14px;
            max-height: 300px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const FACE_API_MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api@latest/model';

        function HostSetup() {
            const [apiKey, setApiKey] = useState('');
            const [driveUrl, setDriveUrl] = useState('');
            const [isLoadingModels, setIsLoadingModels] = useState(false);
            const [modelsLoaded, setModelsLoaded] = useState(false);
            const [isIndexingPhotos, setIsIndexingPhotos] = useState(false);
            const [indexedPhotos, setIndexedPhotos] = useState([]);
            const [folderStructure, setFolderStructure] = useState([]);
            const [error, setError] = useState('');
            const [success, setSuccess] = useState('');
            const [jsonReady, setJsonReady] = useState(false);
            const [jsonData, setJsonData] = useState(null);
            
            const fileInputRef = useRef(null);

            // Load face-api models
            const loadModels = async () => {
                setIsLoadingModels(true);
                setError('');
                try {
                    await faceapi.nets.ssdMobilenetv1.loadFromUri(FACE_API_MODEL_URL);
                    await faceapi.nets.faceLandmark68Net.loadFromUri(FACE_API_MODEL_URL);
                    await faceapi.nets.faceRecognitionNet.loadFromUri(FACE_API_MODEL_URL);
                    setModelsLoaded(true);
                    setSuccess('Face detection models loaded successfully!');
                } catch (err) {
                    setError('Failed to load face detection models: ' + err.message);
                } finally {
                    setIsLoadingModels(false);
                }
            };

            useEffect(() => {
                loadModels();
            }, []);

            // Extract folder ID from Google Drive URL
            const extractFolderId = (url) => {
                const match = url.match(/folders\/([a-zA-Z0-9-_]+)/);
                return match ? match[1] : null;
            };

            // Recursively fetch all files from Google Drive folder
            const fetchDriveFiles = async (folderId, path = '', structure = []) => {
                try {
                    let pageToken = '';
                    let allFiles = [];
                    
                    do {
                        const url = `https://www.googleapis.com/drive/v3/files?q='${folderId}'+in+parents&key=${apiKey}&fields=files(id,name,mimeType,webContentLink,webViewLink),nextPageToken${pageToken ? `&pageToken=${pageToken}` : ''}`;
                        const response = await fetch(url);
                        
                        if (!response.ok) {
                            throw new Error(`Google Drive API error: ${response.status}`);
                        }
                        
                        const data = await response.json();
                        allFiles = allFiles.concat(data.files || []);
                        pageToken = data.nextPageToken;
                    } while (pageToken);

                    const currentLevel = { path, files: [], folders: [] };
                    structure.push(currentLevel);

                    const files = [];
                    
                    for (const file of allFiles) {
                        if (file.mimeType === 'application/vnd.google-apps.folder') {
                            currentLevel.folders.push(file.name);
                            const subFiles = await fetchDriveFiles(file.id, `${path}/${file.name}`, structure);
                            files.push(...subFiles);
                        } else if (file.mimeType.startsWith('image/')) {
                            currentLevel.files.push(file.name);
                            files.push({
                                id: file.id,
                                name: file.name,
                                path: `${path}/${file.name}`,
                                downloadUrl: file.webContentLink,
                                viewUrl: file.webViewLink
                            });
                        }
                    }
                    
                    return files;
                } catch (error) {
                    console.error('Error fetching drive files:', error);
                    throw error;
                }
            };

            // Extract face descriptors from image
            const extractFaceDescriptor = async (imageElement) => {
                try {
                    const detection = await faceapi
                        .detectSingleFace(imageElement)
                        .withFaceLandmarks()
                        .withFaceDescriptor();
                    
                    return detection ? detection.descriptor : null;
                } catch (error) {
                    console.warn('Face detection failed:', error);
                    return null;
                }
            };

            // Index all photos from Google Drive
            const indexPhotos = async () => {
                if (!apiKey || !driveUrl) {
                    setError('Please enter both API key and Drive folder URL');
                    return;
                }

                const folderId = extractFolderId(driveUrl);
                if (!folderId) {
                    setError('Invalid Google Drive folder URL');
                    return;
                }

                setIsIndexingPhotos(true);
                setError('');
                setSuccess('');
                setFolderStructure([]);

                try {
                    const structure = [];
                    const files = await fetchDriveFiles(folderId, 'Goldhana Photos', structure);
                    setFolderStructure(structure);

                    const indexed = [];
                    let processed = 0;

                    for (const file of files) {
                        try {
                            setSuccess(`Processing ${file.name}... (${processed + 1}/${files.length})`);
                            
                            const img = new Image();
                            img.crossOrigin = 'anonymous';
                            
                            await new Promise((resolve, reject) => {
                                img.onload = () => {
                                    console.log(`Loaded image: ${file.name}, Size: ${img.width}x${img.height}`);
                                    resolve();
                                };
                                img.onerror = (error) => {
                                    console.error(`Failed to load image: ${file.name}`, error);
                                    reject(error);
                                };
                                img.src = `https://drive.google.com/thumbnail?id=${file.id}&sz=w800`;
                            });

                            const descriptor = await extractFaceDescriptor(img);
                            console.log(`Face detection result for ${file.name}:`, descriptor ? 'Found face' : 'No face');
                            if (descriptor) {
                                indexed.push({
                                    ...file,
                                    descriptor: Array.from(descriptor), // Convert to array for JSON storage
                                    thumbnail: img.src
                                });
                            }
                        } catch (error) {
                            console.warn(`Failed to process ${file.name}:`, error);
                        }
                        processed++;
                    }

                    setIndexedPhotos(indexed);

                    const dataToStore = {
                        photos: indexed,
                        structure: structure,
                        timestamp: Date.now()
                    };
                    setJsonData(dataToStore);
                    setJsonReady(true);
                    downloadJson(dataToStore);

                    setSuccess(`Successfully indexed ${indexed.length} photos with faces from ${files.length} total images! photo-data.json has been downloaded — add it to your project and deploy to Netlify.`);
                } catch (error) {
                    setError('Failed to index photos: ' + error.message);
                } finally {
                    setIsIndexingPhotos(false);
                }
            };

            // Handle direct photo upload
            const handlePhotoUpload = async (files) => {
                setIsIndexingPhotos(true);
                setError('');
                setSuccess('');

                try {
                    const indexed = [];
                    
                    for (const file of files) {
                        if (!file.type.startsWith('image/')) continue;
                        
                        const img = new Image();
                        const url = URL.createObjectURL(file);
                        
                        await new Promise((resolve, reject) => {
                            img.onload = resolve;
                            img.onerror = reject;
                            img.src = url;
                        });

                        const descriptor = await extractFaceDescriptor(img);
                        if (descriptor) {
                            const reader = new FileReader();
                            const dataUrl = await new Promise((resolve) => {
                                reader.onload = (e) => resolve(e.target.result);
                                reader.readAsDataURL(file);
                            });
                            
                            indexed.push({
                                id: file.name,
                                name: file.name,
                                path: file.name,
                                descriptor: Array.from(descriptor),
                                thumbnail: dataUrl,
                                downloadUrl: dataUrl
                            });
                        }
                        
                        URL.revokeObjectURL(url);
                    }

                    setIndexedPhotos(indexed);

                    const dataToStore = {
                        photos: indexed,
                        structure: [],
                        timestamp: Date.now()
                    };
                    setJsonData(dataToStore);
                    setJsonReady(true);
                    downloadJson(dataToStore);

                    setSuccess(`Successfully indexed ${indexed.length} photos with faces! photo-data.json has been downloaded — add it to your project and deploy to Netlify.`);
                } catch (error) {
                    setError('Failed to process uploaded photos: ' + error.message);
                } finally {
                    setIsIndexingPhotos(false);
                }
            };

            // Download the photo-data.json file for deployment
            const downloadJson = (data) => {
                const dataStr = JSON.stringify(data);
                const blob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = 'photo-data.json';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
            };

            const clearAllData = () => {
                if (confirm('Are you sure you want to clear this session? This only clears the current page — it does not affect any deployed photo-data.json.')) {
                    setIndexedPhotos([]);
                    setFolderStructure([]);
                    setJsonReady(false);
                    setJsonData(null);
                    setSuccess('Session cleared.');
                }
            };

            return (
                <div className="container">
                    <div className="header">
                        <h1>🌺 Host Setup Panel 🌺</h1>
                        <p>Index wedding photos for Parth & Riddhi's Goldhana ceremony</p>
                    </div>

                    {/* Photo Indexing Section */}
                    <div className="section">
                        <h2>📸 Index Wedding Photos</h2>
                        
                        <div style={{ display: 'flex', gap: '20px', marginBottom: '20px', flexWrap: 'wrap' }}>
                            <div style={{ flex: '1', minWidth: '300px' }}>
                                <h3 style={{ marginBottom: '15px', color: '#8B4513' }}>Option A: Google Drive Folder</h3>
                                <div className="input-group">
                                    <label htmlFor="apiKey">Google Drive API Key:</label>
                                    <input
                                        type="text"
                                        id="apiKey"
                                        value={apiKey}
                                        onChange={(e) => setApiKey(e.target.value)}
                                        placeholder="Enter your Google Drive API key"
                                    />
                                </div>
                                <div className="input-group">
                                    <label htmlFor="driveUrl">Drive Folder URL:</label>
                                    <input
                                        type="url"
                                        id="driveUrl"
                                        value={driveUrl}
                                        onChange={(e) => setDriveUrl(e.target.value)}
                                        placeholder="https://drive.google.com/drive/folders/..."
                                    />
                                </div>
                                <button 
                                    className="btn" 
                                    onClick={indexPhotos}
                                    disabled={!modelsLoaded || isIndexingPhotos || !apiKey || !driveUrl}
                                >
                                    {isIndexingPhotos ? 'Indexing Photos...' : 'Index Drive Photos'}
                                </button>
                            </div>
                            
                            <div style={{ flex: '1', minWidth: '300px' }}>
                                <h3 style={{ marginBottom: '15px', color: '#8B4513' }}>Option B: Direct Upload</h3>
                                <div 
                                    className="upload-area"
                                    onClick={() => fileInputRef.current?.click()}
                                    onDrop={(e) => {
                                        e.preventDefault();
                                        e.currentTarget.classList.remove('dragover');
                                        handlePhotoUpload(Array.from(e.dataTransfer.files));
                                    }}
                                    onDragOver={(e) => {
                                        e.preventDefault();
                                        e.currentTarget.classList.add('dragover');
                                    }}
                                    onDragLeave={(e) => {
                                        e.currentTarget.classList.remove('dragover');
                                    }}
                                >
                                    <div style={{ fontSize: '3rem', marginBottom: '15px' }}>📷</div>
                                    <p>Click or drag photos here</p>
                                </div>
                                <input
                                    type="file"
                                    ref={fileInputRef}
                                    multiple
                                    accept="image/*"
                                    style={{ display: 'none' }}
                                    onChange={(e) => handlePhotoUpload(Array.from(e.target.files))}
                                />
                            </div>
                        </div>

                        {/* Model Loading Status */}
                        {isLoadingModels && (
                            <div className="loading">
                                <div className="spinner"></div>
                                <p>Loading face detection models...</p>
                            </div>
                        )}

                        {/* Stats */}
                        {indexedPhotos.length > 0 && (
                            <div className="stats">
                                <div className="stat-item">
                                    <div className="stat-number">{indexedPhotos.length}</div>
                                    <div className="stat-label">Photos Indexed</div>
                                </div>
                                <div className="stat-item">
                                    <div className="stat-number">{folderStructure.reduce((acc, level) => acc + level.folders.length, 0)}</div>
                                    <div className="stat-label">Folders Scanned</div>
                                </div>
                            </div>
                        )}

                        {/* Folder Structure Display */}
                        {folderStructure.length > 0 && (
                            <div>
                                <h4 style={{ color: '#8B4513', marginBottom: '10px' }}>📁 Folder Structure:</h4>
                                <div className="folder-tree">
                                    {folderStructure.map((level, index) => (
                                        <div key={index}>
                                            <div style={{ color: '#007bff', fontWeight: 'bold' }}>
                                                {level.path || 'Root'} ({level.files.length} images)
                                            </div>
                                            {level.files.slice(0, 3).map((file, i) => (
                                                <div key={i} style={{ color: '#28a745', marginLeft: '20px' }}>
                                                    🖼️ {file}
                                                </div>
                                            ))}
                                            {level.files.length > 3 && (
                                                <div style={{ color: '#28a745', marginLeft: '20px' }}>
                                                    ... and {level.files.length - 3} more
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>

                    {/* Deployment Instructions */}
                    {jsonReady && (
                        <div className="section">
                            <div className="instructions">
                                <h3>🎉 Almost done! Deploy to Netlify:</h3>
                                <ol>
                                    <li><strong>photo-data.json</strong> was just downloaded to your computer.</li>
                                    <li>Move it into this project folder (next to <code>index.html</code>).</li>
                                    <li>Commit and push to GitHub — Netlify will auto-deploy.</li>
                                    <li>Share your Netlify URL with guests — they can now find their photos!</li>
                                </ol>
                                <div style={{ marginTop: '15px' }}>
                                    <button className="btn" onClick={() => downloadJson(jsonData)}>
                                        📥 Download photo-data.json Again
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Actions */}
                    <div className="section">
                        <h2>🛠️ Actions</h2>
                        <button className="btn" onClick={clearAllData}>
                            🗑️ Clear All Data
                        </button>
                        <button className="btn" onClick={() => window.location.reload()}>
                            🔄 Refresh Page
                        </button>
                    </div>

                    {/* Messages */}
                    {error && <div className="error">❌ {error}</div>}
                    {success && <div className="success">✅ {success}</div>}
                </div>
            );
        }

        ReactDOM.render(<HostSetup />, document.getElementById('root'));
    </script>
</body>
</html>
