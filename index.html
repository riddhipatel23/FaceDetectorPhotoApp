<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riddhi & Parth — Goldhana Ceremony</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Great+Vibes&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(150deg, #dce8d4 0%, #f0ebe2 50%, #e8e2d8 100%);
            min-height: 100vh;
            color: #2c3828;
        }

        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 24px 16px 48px;
        }

        /* ── HEADER ── */
        .header {
            text-align: center;
            margin-bottom: 32px;
            border-radius: 20px;
            box-shadow: 0 6px 40px rgba(30, 40, 25, 0.28);
            border: 1px solid rgba(107, 143, 94, 0.28);
            position: relative;
            overflow: hidden;
            min-height: 340px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .header-bg {
            position: absolute;
            inset: 0;
            background-image: url('./img1.png');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            filter: brightness(0.82);
        }

        .header-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                to bottom,
                rgba(20, 30, 18, 0.15) 0%,
                rgba(20, 30, 18, 0.45) 55%,
                rgba(15, 22, 12, 0.78) 100%
            );
        }

        .header-content {
            position: relative;
            z-index: 2;
            padding: 32px 30px 36px;
        }

        .om {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem;
            color: rgba(255, 255, 255, 0.88);
            margin-bottom: 2px;
            letter-spacing: 3px;
            text-shadow: 0 2px 12px rgba(0,0,0,0.4);
        }

        .lotus-divider {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin: 6px 0 14px;
            color: rgba(210, 230, 200, 0.7);
            font-size: 0.95rem;
        }

        .lotus-divider::before,
        .lotus-divider::after {
            content: '';
            flex: 1;
            max-width: 70px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(210,230,200,0.55));
        }

        .lotus-divider::after {
            background: linear-gradient(90deg, rgba(210,230,200,0.55), transparent);
        }

        .header h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 4rem;
            color: #ffffff;
            line-height: 1.1;
            margin-bottom: 6px;
            text-shadow: 0 2px 20px rgba(0,0,0,0.45);
        }

        .ceremony-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.85rem;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: rgba(210, 230, 200, 0.9);
            margin-bottom: 14px;
            font-weight: 400;
        }

        .blessing {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 1.15rem;
            color: rgba(255, 255, 255, 0.92);
            margin-bottom: 10px;
            text-shadow: 0 1px 10px rgba(0,0,0,0.4);
            line-height: 1.5;
        }

        .header-subtitle {
            font-size: 0.88rem;
            color: rgba(210, 230, 200, 0.8);
            font-weight: 300;
            line-height: 1.6;
            max-width: 440px;
            margin: 0 auto;
        }

        /* ── SECTION CARD ── */
        .section {
            background: rgba(254, 252, 248, 0.97);
            margin: 20px 0;
            padding: 32px;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(60, 80, 50, 0.08);
            border: 1px solid rgba(107, 143, 94, 0.2);
        }

        .section h2 {
            font-family: 'Cormorant Garamond', serif;
            color: #3d5c38;
            margin-bottom: 8px;
            font-size: 1.7rem;
            font-weight: 600;
            letter-spacing: 0.02em;
        }

        .section-subtitle {
            color: #6a7d65;
            font-size: 0.95rem;
            margin-bottom: 28px;
            font-weight: 300;
            line-height: 1.6;
        }

        .section-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(107,143,94,0.3), transparent);
            margin: 20px 0;
        }

        /* ── BUTTONS ── */
        .btn {
            background: linear-gradient(135deg, #5c7a52 0%, #7d9e72 100%);
            color: #fefcf8;
            border: none;
            padding: 13px 28px;
            border-radius: 50px;
            font-size: 0.95rem;
            font-family: 'Nunito', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            margin: 6px;
            box-shadow: 0 4px 14px rgba(92, 122, 82, 0.30);
            letter-spacing: 0.03em;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(92, 122, 82, 0.40);
            background: linear-gradient(135deg, #4a6741 0%, #6b8f5e 100%);
        }

        .btn:disabled {
            background: linear-gradient(135deg, #b8c8b0, #c8d8c0);
            color: #8a9e84;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-rose {
            background: linear-gradient(135deg, #b8756c 0%, #c4847a 100%);
            box-shadow: 0 4px 14px rgba(184, 117, 108, 0.28);
        }

        .btn-rose:hover {
            background: linear-gradient(135deg, #a06560 0%, #b8756c 100%);
            box-shadow: 0 6px 20px rgba(184, 117, 108, 0.38);
        }

        .btn-rose:disabled {
            background: linear-gradient(135deg, #d8b8b4, #e0c4c0);
            color: #b89490;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-outline {
            background: transparent;
            color: #5c7a52;
            border: 1.5px solid #7d9e72;
            box-shadow: none;
        }

        .btn-outline:hover {
            background: rgba(92, 122, 82, 0.08);
            box-shadow: none;
        }

        .btn-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 28px;
        }

        /* ── LOADING BANNER ── */
        .loading-banner {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: rgba(184, 200, 168, 0.25);
            border: 1px solid rgba(107, 143, 94, 0.3);
            color: #4a6741;
            padding: 12px 18px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.92rem;
            font-weight: 400;
        }

        /* ── SPINNER ── */
        .spinner {
            border: 3px solid rgba(107, 143, 94, 0.2);
            border-top: 3px solid #6b8f5e;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        .spinner-sm {
            width: 20px;
            height: 20px;
            border-width: 2px;
            margin: 0;
            flex-shrink: 0;
        }

        @keyframes spin {
            0%   { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading {
            text-align: center;
            padding: 36px 20px;
            color: #5a6b56;
        }

        .loading p {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1rem;
            font-style: italic;
        }

        .loading .sub {
            font-family: 'Nunito', sans-serif;
            font-size: 0.85rem;
            color: #8a9e84;
            margin-top: 8px;
            font-style: normal;
        }

        /* ── STATS ── */
        .stats {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin: 20px 0;
        }

        .stat-item {
            text-align: center;
            padding: 14px 20px;
            background: rgba(184, 200, 168, 0.18);
            border: 1px solid rgba(107, 143, 94, 0.2);
            border-radius: 12px;
            min-width: 110px;
        }

        .stat-number {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.9rem;
            font-weight: 600;
            color: #3d5c38;
            line-height: 1;
        }

        .stat-label {
            color: #6a7d65;
            font-size: 0.78rem;
            margin-top: 4px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            font-weight: 600;
        }

        /* ── CAMERA MODAL ── */
        .camera-modal {
            position: fixed;
            inset: 0;
            background: rgba(10, 14, 8, 0.92);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(6px);
            animation: fadeIn 0.2s ease;
        }

        .camera-modal-box {
            position: relative;
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .camera-feed {
            width: 100%;
            border-radius: 16px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
            display: block;
        }

        .camera-close {
            position: absolute;
            top: -14px;
            right: -14px;
            background: rgba(254, 252, 248, 0.95);
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.3);
            color: #3d5c38;
        }

        .capture-btn {
            background: linear-gradient(135deg, #5c7a52, #7d9e72);
            border: 4px solid rgba(254, 252, 248, 0.9);
            border-radius: 50%;
            width: 76px;
            height: 76px;
            font-size: 28px;
            cursor: pointer;
            box-shadow: 0 4px 24px rgba(60, 80, 50, 0.45);
            transition: transform 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .capture-btn:hover {
            transform: scale(1.08);
        }

        .camera-hint {
            color: rgba(210, 230, 200, 0.8);
            font-size: 0.88rem;
            font-style: italic;
            text-align: center;
        }

        /* ── YOUR PHOTO PREVIEW ── */
        .your-photo {
            text-align: center;
            margin: 28px 0 8px;
        }

        .your-photo h4 {
            font-family: 'Cormorant Garamond', serif;
            color: #3d5c38;
            font-size: 1.1rem;
            font-style: italic;
            margin-bottom: 14px;
        }

        .your-photo img {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(107, 143, 94, 0.4);
            box-shadow: 0 6px 24px rgba(60, 80, 50, 0.18);
        }

        /* ── GALLERY ── */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
            margin-top: 28px;
        }

        .photo-card {
            background: #fefcf8;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 4px 18px rgba(60, 80, 50, 0.10);
            border: 1px solid rgba(107, 143, 94, 0.15);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        .photo-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 28px rgba(60, 80, 50, 0.16);
        }

        .photo-card img {
            width: 100%;
            height: 195px;
            object-fit: cover;
        }

        .photo-info {
            padding: 14px 16px 16px;
        }

        .photo-name {
            font-size: 0.82rem;
            color: #6a7d65;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .confidence-bar {
            background: rgba(184, 200, 168, 0.3);
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
            margin: 8px 0;
        }

        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, #6b8f5e, #9ab08a);
            border-radius: 3px;
            transition: width 0.4s ease;
        }

        .confidence-label {
            font-size: 0.8rem;
            color: #8a9e84;
            margin-bottom: 12px;
        }

        /* ── MESSAGES ── */
        .msg {
            padding: 14px 18px;
            border-radius: 10px;
            margin: 14px 0;
            font-size: 0.93rem;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .msg-success {
            background: rgba(184, 200, 168, 0.25);
            border: 1px solid rgba(107, 143, 94, 0.35);
            color: #3d5c38;
        }

        .msg-error {
            background: rgba(196, 132, 122, 0.12);
            border: 1px solid rgba(196, 132, 122, 0.35);
            color: #7a3028;
        }

        .msg-warning {
            background: rgba(200, 180, 130, 0.18);
            border: 1px solid rgba(168, 144, 96, 0.35);
            color: #5c4820;
        }

        /* ── WELCOME / NOT READY ── */
        .welcome-section {
            text-align: center;
            padding: 40px 20px;
        }

        .welcome-section .big-icon {
            font-size: 3.5rem;
            margin-bottom: 20px;
            opacity: 0.7;
        }

        .welcome-section h2 {
            font-family: 'Cormorant Garamond', serif;
            color: #3d5c38;
            font-size: 1.8rem;
            margin-bottom: 12px;
        }

        .welcome-section p {
            color: #6a7d65;
            font-size: 1rem;
            line-height: 1.7;
        }

        /* ── RESULTS HEADER ── */
        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 8px;
        }

        /* ── LIGHTBOX ── */
        .lightbox-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(10, 14, 8, 0.88);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(6px);
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        .lightbox-box {
            position: relative;
            max-width: min(90vw, 860px);
            max-height: 92vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: scaleIn 0.2s ease;
        }

        @keyframes scaleIn {
            from { transform: scale(0.93); opacity: 0; }
            to   { transform: scale(1);    opacity: 1; }
        }

        .lightbox-box img {
            max-width: 100%;
            max-height: 80vh;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 12px 60px rgba(0,0,0,0.6);
            display: block;
        }

        .lightbox-close {
            position: absolute;
            top: -14px;
            right: -14px;
            background: rgba(254, 252, 248, 0.95);
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.3);
            color: #3d5c38;
            line-height: 1;
        }

        .lightbox-close:hover {
            background: #fff;
        }

        .lightbox-actions {
            margin-top: 14px;
            display: flex;
            gap: 12px;
        }

        .photo-card img {
            cursor: zoom-in;
        }

        .results-note {
            text-align: center;
            margin-top: 28px;
            color: #8a9e84;
            font-size: 0.85rem;
            font-style: italic;
            font-family: 'Cormorant Garamond', serif;
        }

        /* ── FILM SECTION ── */
        .film-section h2 {
            font-family: 'Cormorant Garamond', serif;
            color: #3d5c38;
            font-size: 1.7rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .film-section .section-subtitle {
            margin-bottom: 20px;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 */
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 6px 32px rgba(30, 40, 25, 0.18);
        }

        .video-wrapper iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 640px) {
            .header h1    { font-size: 2.8rem; }
            .gallery      { grid-template-columns: 1fr; }
            .section      { padding: 24px 18px; }
            .btn          { padding: 11px 22px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const FACE_API_MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api@latest/model';
        const CONFIDENCE_THRESHOLD = 0.50;

        function GuestFinder() {
            const [isLoadingModels, setIsLoadingModels] = useState(false);
            const [modelsLoaded, setModelsLoaded]       = useState(false);
            const [isLoadingPhotos, setIsLoadingPhotos] = useState(true);
            const [indexedPhotos, setIndexedPhotos]     = useState([]);
            const [guestPhoto, setGuestPhoto]           = useState(null);
            const [isProcessingGuest, setIsProcessingGuest] = useState(false);
            const [matchedPhotos, setMatchedPhotos]     = useState([]);
            const [showCamera, setShowCamera]           = useState(false);
            const [error, setError]     = useState('');
            const [success, setSuccess] = useState('');
            const [warning, setWarning] = useState('');
            const [selectedPhoto, setSelectedPhoto] = useState(null);

            const videoRef     = useRef(null);
            const canvasRef    = useRef(null);
            const streamRef    = useRef(null);
            const loadingRef   = useRef(null);
            const resultsRef   = useRef(null);

            const loadModels = async () => {
                setIsLoadingModels(true);
                setError('');
                try {
                    await faceapi.nets.ssdMobilenetv1.loadFromUri(FACE_API_MODEL_URL);
                    await faceapi.nets.faceLandmark68Net.loadFromUri(FACE_API_MODEL_URL);
                    await faceapi.nets.faceRecognitionNet.loadFromUri(FACE_API_MODEL_URL);
                    setModelsLoaded(true);
                } catch (err) {
                    setError('Failed to load face detection models: ' + err.message);
                } finally {
                    setIsLoadingModels(false);
                }
            };

            const loadIndexedPhotos = async () => {
                setIsLoadingPhotos(true);
                try {
                    const response = await fetch('./photo-data.json');
                    if (!response.ok) {
                        setWarning('No photos found! The hosts need to set up the photo database first.');
                        return;
                    }
                    const data = await response.json();
                    if (data.photos && data.photos.length > 0) {
                        const photos = data.photos.map(photo => ({
                            ...photo,
                            descriptor: new Float32Array(photo.descriptor)
                        }));
                        setIndexedPhotos(photos);
                    } else {
                        setWarning('No photos found! The hosts need to set up the photo database first.');
                    }
                } catch (err) {
                    console.error('Failed to load indexed photos:', err);
                    setWarning('No photos found! The hosts need to set up the photo database first.');
                } finally {
                    setIsLoadingPhotos(false);
                }
            };

            useEffect(() => {
                loadModels();
                loadIndexedPhotos();
            }, []);

            useEffect(() => {
                const onKey = (e) => { if (e.key === 'Escape') setSelectedPhoto(null); };
                window.addEventListener('keydown', onKey);
                return () => window.removeEventListener('keydown', onKey);
            }, []);

            const extractFaceDescriptor = async (imageElement) => {
                try {
                    const detection = await faceapi
                        .detectSingleFace(imageElement)
                        .withFaceLandmarks()
                        .withFaceDescriptor();
                    return detection ? detection.descriptor : null;
                } catch (err) {
                    console.warn('Face detection failed:', err);
                    return null;
                }
            };

            // Attach stream after video element mounts
            useEffect(() => {
                if (showCamera && videoRef.current && streamRef.current) {
                    videoRef.current.srcObject = streamRef.current;
                    videoRef.current.play().catch(() => {});
                }
            }, [showCamera]);

            const startCamera = async () => {
                setError('');
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } }
                    });
                    streamRef.current = stream;
                    setShowCamera(true);
                } catch (err) {
                    setError('Failed to access camera: ' + err.message);
                }
            };

            const closeCamera = () => {
                if (streamRef.current) {
                    streamRef.current.getTracks().forEach(t => t.stop());
                    streamRef.current = null;
                }
                setShowCamera(false);
            };

            const captureSelfie = () => {
                const video  = videoRef.current;
                const canvas = canvasRef.current;
                if (video && canvas) {
                    const ctx = canvas.getContext('2d');
                    canvas.width  = video.videoWidth;
                    canvas.height = video.videoHeight;
                    ctx.drawImage(video, 0, 0);
                    canvas.toBlob((blob) => {
                        processGuestPhoto(new File([blob], 'selfie.jpg', { type: 'image/jpeg' }));
                    });
                    if (streamRef.current) {
                        streamRef.current.getTracks().forEach(t => t.stop());
                        streamRef.current = null;
                    }
                    setShowCamera(false);
                }
            };

            const processGuestPhoto = async (file) => {
                if (!modelsLoaded) {
                    setError('Face detection is still loading. Please wait a moment and try again.');
                    return;
                }
                if (indexedPhotos.length === 0) {
                    setError('No photos available to search. Please contact the hosts.');
                    return;
                }

                setIsProcessingGuest(true);
                setError(''); setSuccess(''); setWarning('');
                setMatchedPhotos([]);
                setTimeout(() => loadingRef.current?.scrollIntoView({ behavior: 'smooth', block: 'center' }), 100);

                try {
                    const url = URL.createObjectURL(file);
                    const img = new Image();
                    await new Promise((resolve, reject) => {
                        img.onload = resolve;
                        img.onerror = reject;
                        img.src = url;
                    });

                    setGuestPhoto(url); // kept alive — not revoked while displayed

                    const guestDescriptor = await extractFaceDescriptor(img);
                    if (!guestDescriptor) {
                        throw new Error('No face detected in your photo. Please try again with a clearer, well-lit image where your face is clearly visible.');
                    }

                    // Best-match-per-photo: same photo may have multiple face entries; keep the closest
                    const bestPerPhoto = new Map();
                    for (const photo of indexedPhotos) {
                        try {
                            const distance   = faceapi.euclideanDistance(guestDescriptor, photo.descriptor);
                            const confidence = Math.max(0, (1 - distance) * 100);
                            if (distance < CONFIDENCE_THRESHOLD) {
                                const existing = bestPerPhoto.get(photo.id);
                                if (!existing || distance < existing.distance) {
                                    bestPerPhoto.set(photo.id, { ...photo, confidence, distance });
                                }
                            }
                        } catch (e) {
                            console.warn('Compare error:', photo.name, e);
                        }
                    }
                    const matches = Array.from(bestPerPhoto.values());
                    matches.sort((a, b) => a.distance - b.distance);
                    setMatchedPhotos(matches);
                    if (matches.length > 0) {
                        setSuccess(`Found ${matches.length} photos featuring you!`);
                        setTimeout(() => resultsRef.current?.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
                    } else {
                        setWarning('No matches found. Try a photo with better lighting or where your face is more clearly visible.');
                    }
                } catch (err) {
                    setError(err.message);
                } finally {
                    setIsProcessingGuest(false);
                }
            };

            const downloadAllMatches = () => {
                if (!matchedPhotos.length) return;
                setSuccess(`Starting download of ${matchedPhotos.length} photos...`);
                matchedPhotos.forEach((photo, i) => {
                    setTimeout(() => {
                        const link = document.createElement('a');
                        link.href = photo.downloadUrl;
                        link.download = photo.name;
                        document.body.appendChild(link);
                        link.click();
                        document.body.removeChild(link);
                    }, i * 500);
                });
            };

            const Header = () => (
                <div className="header">
                    <div className="header-bg"></div>
                    <div className="header-overlay"></div>
                    <div className="header-content">
                        <div className="om">ॐ</div>
                        <div className="lotus-divider">🪷</div>
                        <h1>Riddhi &amp; Parth</h1>
                        <div className="ceremony-title">Goldhana Ceremony</div>
                        <div className="blessing">
                            You made our Goldhana unforgettable —<br/>relive your moments here 🤍
                        </div>
                        <p className="header-subtitle">
                            Upload your photo to find all the beautiful moments you're part of
                        </p>
                    </div>
                </div>
            );

            // ── Loading photo DB ──
            if (isLoadingPhotos) {
                return (
                    <div className="container">
                        <Header />
                        <div className="section">
                            <div className="loading">
                                <div className="spinner"></div>
                                <p>Loading photo database...</p>
                            </div>
                        </div>
                    </div>
                );
            }

            // ── Not set up yet ──
            if (indexedPhotos.length === 0) {
                return (
                    <div className="container">
                        <Header />
                        <div className="section">
                            <div className="welcome-section">
                                <div className="big-icon">🪷</div>
                                <h2>Photos Coming Soon</h2>
                                <p>The ceremony photo collection hasn't been set up yet.<br/>Please check back shortly!</p>
                                <br/>
                                <button className="btn btn-outline" onClick={() => window.location.reload()}>
                                    Refresh
                                </button>
                            </div>
                        </div>
                        {warning && <div className="msg msg-warning">⚠️ {warning}</div>}
                    </div>
                );
            }

            // ── Main view ──
            return (
                <div className="container">
                    <Header />

                    <div className="section film-section">
                        <h2>Our Ceremony Film</h2>
                        <p className="section-subtitle">Relive every blessed moment of our Goldhana</p>
                        <div className="video-wrapper">
                            <iframe
                                src="https://www.youtube.com/embed/kcfAAK_nvPY"
                                title="Riddhi &amp; Parth — Goldhana Ceremony Film"
                                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                                allowFullScreen
                            />
                        </div>
                    </div>

                    <div className="section">
                        <h2>Find Your Photos</h2>
                        <p className="section-subtitle">
                            Take a selfie or upload a photo of yourself — we'll find every moment you appear in from the ceremony.
                        </p>

                        {!modelsLoaded && (
                            <div className="loading-banner">
                                <div className="spinner spinner-sm"></div>
                                Loading face detection — buttons will unlock in a moment...
                            </div>
                        )}

                        <div className="btn-row">
                            <button className="btn" onClick={startCamera} disabled={!modelsLoaded || isProcessingGuest}>
                                {modelsLoaded ? '📷  Take Selfie' : '⏳  Loading...'}
                            </button>
                            <button
                                className="btn btn-rose"
                                disabled={!modelsLoaded || isProcessingGuest}
                                onClick={() => {
                                    const input = document.createElement('input');
                                    input.type = 'file';
                                    input.accept = 'image/*';
                                    input.style.display = 'none';
                                    document.body.appendChild(input);
                                    input.onchange = (e) => {
                                        document.body.removeChild(input);
                                        if (e.target.files[0]) processGuestPhoto(e.target.files[0]);
                                    };
                                    input.click();
                                }}
                            >
                                {modelsLoaded ? '🌸  Upload Photo' : '⏳  Loading...'}
                            </button>
                        </div>

                        {showCamera && (
                            <div className="camera-modal" onClick={closeCamera}>
                                <div className="camera-modal-box" onClick={e => e.stopPropagation()}>
                                    <button className="camera-close" onClick={closeCamera}>✕</button>
                                    <video ref={videoRef} autoPlay muted playsInline className="camera-feed" />
                                    <button className="capture-btn" onClick={captureSelfie}>📸</button>
                                    <p className="camera-hint">Position your face clearly in frame, then tap 📸</p>
                                </div>
                            </div>
                        )}

                        {isProcessingGuest && (
                            <div className="loading" ref={loadingRef}>
                                <div className="spinner"></div>
                                <p>Searching through {indexedPhotos.length.toLocaleString()} photos...</p>
                                <p className="sub">This may take a moment</p>
                            </div>
                        )}

                        {guestPhoto && !isProcessingGuest && (
                            <div className="your-photo">
                                <h4>Your Photo</h4>
                                <img src={guestPhoto} alt="Your photo" />
                            </div>
                        )}
                    </div>

                    {matchedPhotos.length > 0 && (
                        <div className="section" ref={resultsRef}>
                            <div className="results-header">
                                <h2>Your Moments  <span style={{ color: '#a89060', fontWeight: 300 }}>({matchedPhotos.length})</span></h2>
                                <button className="btn" onClick={downloadAllMatches}>
                                    ↓  Download All
                                </button>
                            </div>
                            <div className="section-divider"></div>

                            <div className="gallery">
                                {matchedPhotos.map((photo, i) => (
                                    <div key={photo.id + i} className="photo-card">
                                        <img src={photo.thumbnail} alt={photo.name} onClick={() => setSelectedPhoto(photo)} />
                                        <div className="photo-info">
                                            <div className="photo-name">{photo.name}</div>
                                            <div className="confidence-bar">
                                                <div className="confidence-fill" style={{ width: `${photo.confidence}%` }} />
                                            </div>
                                            <div className="confidence-label">Match: {photo.confidence.toFixed(1)}%</div>
                                            <button
                                                className="btn btn-outline"
                                                style={{ width: '100%', fontSize: '0.85rem', padding: '9px 16px' }}
                                                onClick={() => {
                                                    const link = document.createElement('a');
                                                    link.href = photo.downloadUrl;
                                                    link.download = photo.name;
                                                    document.body.appendChild(link);
                                                    link.click();
                                                    document.body.removeChild(link);
                                                }}
                                            >
                                                Download
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>

                            <p className="results-note">
                                Photos sorted by match confidence — higher percentage means a stronger match
                            </p>
                        </div>
                    )}

                    {error   && <div className="msg msg-error">❌  {error}</div>}
                    {success && <div className="msg msg-success">🪷  {success}</div>}
                    {warning && <div className="msg msg-warning">⚠️  {warning}</div>}

                    {selectedPhoto && (
                        <div className="lightbox-backdrop" onClick={() => setSelectedPhoto(null)}>
                            <div className="lightbox-box" onClick={e => e.stopPropagation()}>
                                <button className="lightbox-close" onClick={() => setSelectedPhoto(null)}>✕</button>
                                <img src={selectedPhoto.thumbnail} alt={selectedPhoto.name} />
                                <div className="lightbox-actions">
                                    <button
                                        className="btn"
                                        onClick={() => {
                                            const link = document.createElement('a');
                                            link.href = selectedPhoto.downloadUrl;
                                            link.download = selectedPhoto.name;
                                            document.body.appendChild(link);
                                            link.click();
                                            document.body.removeChild(link);
                                        }}
                                    >
                                        ↓  Download
                                    </button>
                                    <button className="btn btn-outline" onClick={() => setSelectedPhoto(null)}>
                                        Close
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    <canvas ref={canvasRef} style={{ display: 'none' }} />
                </div>
            );
        }

        ReactDOM.render(<GuestFinder />, document.getElementById('root'));
    </script>
</body>
</html>
